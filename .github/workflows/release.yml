name: release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.0.1 && git push origin v0.0.1
# This builds the size-optimized binary and a per-user MSI installer, computes
# checksums, and publishes a GitHub Release with the portable exe, zip, and MSI.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow a manual run from the Actions tab

permissions:
  contents: write # needed to create the Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      # -- Signing hook (exe) -------------------------------------------------
      # Unsigned for now. When you have a certificate (Certum Open Source, EV,
      # ...), sign target\release\mushak.exe HERE, before the MSI is built so
      # the installer wraps the signed exe. Then also sign the MSI in the
      # matching hook after the "Build MSI" step below.
      # -----------------------------------------------------------------------

      - name: Build MSI installer (WiX v3)
        id: msi
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          # WiX v3 binaries, no admin install needed.
          $zip = "$env:RUNNER_TEMP\wix314.zip"
          Invoke-WebRequest -UseBasicParsing -OutFile $zip `
            "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          $wix = "$env:RUNNER_TEMP\wix314"
          Expand-Archive -Force $zip $wix
          New-Item -ItemType Directory -Force target/wix | Out-Null
          & "$wix\candle.exe" -dVersion=$version -ext WixUIExtension -arch x64 -out target/wix/ packaging/wix/Mushak.wxs
          if ($LASTEXITCODE -ne 0) { exit 1 }
          $msi = "mushak-$version-x64.msi"
          & "$wix\light.exe" -ext WixUIExtension -out $msi target/wix/Mushak.wixobj
          if ($LASTEXITCODE -ne 0) { exit 1 }
          "msi=$msi" >> $env:GITHUB_OUTPUT

      # -- Signing hook (MSI) -------------------------------------------------
      # When signing, sign the ${{ steps.msi.outputs.msi }} here so users don't
      # get an "unknown publisher" prompt on the installer itself.
      # -----------------------------------------------------------------------

      - name: Package artifacts
        id: pkg
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $msi = "${{ steps.msi.outputs.msi }}"
          $stage = "dist"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item target/release/mushak.exe "$stage/mushak.exe"
          Copy-Item LICENSE "$stage/LICENSE"
          Copy-Item README.md "$stage/README.md"
          $zip = "mushak-$version-x64.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          # SHA256 for the portable exe (Scoop/winget), the zip, and the MSI.
          $exeHash = (Get-FileHash target/release/mushak.exe -Algorithm SHA256).Hash
          $zipHash = (Get-FileHash $zip -Algorithm SHA256).Hash
          $msiHash = (Get-FileHash $msi -Algorithm SHA256).Hash
          "mushak.exe  $exeHash" | Out-File SHA256SUMS.txt -Encoding ascii
          "$zip  $zipHash"       | Out-File SHA256SUMS.txt -Encoding ascii -Append
          "$msi  $msiHash"       | Out-File SHA256SUMS.txt -Encoding ascii -Append
          Get-Content SHA256SUMS.txt
          "zip=$zip" >> $env:GITHUB_OUTPUT
          "exe_sha256=$exeHash" >> $env:GITHUB_OUTPUT
          "msi_sha256=$msiHash" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true # review the notes, then click "Publish"
          generate_release_notes: true
          files: |
            target/release/mushak.exe
            ${{ steps.pkg.outputs.zip }}
            ${{ steps.msi.outputs.msi }}
            SHA256SUMS.txt
