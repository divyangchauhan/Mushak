name: release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.0.1 && git push origin v0.0.1
# This builds the size-optimized binary, computes checksums, and publishes a
# GitHub Release with the portable exe + zip attached.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow a manual run from the Actions tab

permissions:
  contents: write # needed to create the Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      # -- Signing hook -------------------------------------------------------
      # Unsigned for now. When you have a certificate (Azure Trusted Signing,
      # Certum Open Source, EV, ...), sign target\release\mushak.exe HERE,
      # before the artifacts are packaged and hashed below. For example:
      #
      #   - name: Sign
      #     uses: azure/trusted-signing-action@v0
      #     with:
      #       azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #       azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #       azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
      #       endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
      #       trusted-signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
      #       certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
      #       files-folder: target/release
      #       files-folder-filter: exe
      # -----------------------------------------------------------------------

      - name: Package artifacts
        id: pkg
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $stage = "dist"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item target/release/mushak.exe "$stage/mushak.exe"
          Copy-Item LICENSE "$stage/LICENSE"
          Copy-Item README.md "$stage/README.md"
          $zip = "mushak-$version-x64.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          # SHA256 for the portable exe (Scoop/winget manifests) and the zip.
          $exeHash = (Get-FileHash target/release/mushak.exe -Algorithm SHA256).Hash
          $zipHash = (Get-FileHash $zip -Algorithm SHA256).Hash
          "mushak.exe  $exeHash" | Out-File SHA256SUMS.txt -Encoding ascii
          "$zip  $zipHash"       | Out-File SHA256SUMS.txt -Encoding ascii -Append
          Get-Content SHA256SUMS.txt
          "zip=$zip" >> $env:GITHUB_OUTPUT
          "exe_sha256=$exeHash" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true # review the notes, then click "Publish"
          generate_release_notes: true
          files: |
            target/release/mushak.exe
            ${{ steps.pkg.outputs.zip }}
            SHA256SUMS.txt
